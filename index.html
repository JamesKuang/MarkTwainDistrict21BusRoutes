<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brooklyn Bus Routes Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {
      --bg:#f4f7fb; --panel:#ffffffee; --card:#ffffff; --text:#162033; --muted:#5f6b7a; --line:#dbe2ea;
      --pill-bg:#eaf2ff; --pill-text:#2563eb; --hover:#f4f8ff; --shadow:0 18px 40px rgba(15,23,42,.12);
      --toolbar:#ffffffd9;
    }
    body.dark {
      --bg:#0b1220; --panel:#0f172ae8; --card:#111827; --text:#e5eefb; --muted:#9fb0c7; --line:#243247;
      --pill-bg:#172554; --pill-text:#bfdbfe; --hover:#172033; --shadow:0 22px 50px rgba(0,0,0,.38);
      --toolbar:#0f172ae8;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; overflow:hidden; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text); background:var(--bg); }
    .globalToolbar { position:sticky; top:0; z-index:1200; padding:14px 18px; border-bottom:1px solid var(--line); background:var(--toolbar); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .globalToolbarLeft { display:flex; align-items:center; gap:10px; min-width:0; }
    .app { display:grid; grid-template-columns:400px 1fr; height:calc(100vh - 73px); }
    .side { padding:20px; border-right:1px solid var(--line); background:var(--panel); backdrop-filter:blur(10px); overflow:hidden; display:flex; flex-direction:column; min-height:0; }
    .main { display:grid; grid-template-rows:1fr; min-height:0; overflow:hidden; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px; margin-bottom:14px; box-shadow:var(--shadow); }
    .legendCard { flex:1; min-height:0; display:flex; flex-direction:column; margin-bottom:0; }
    .eyebrow { display:inline-block; padding:6px 10px; border-radius:999px; background:var(--pill-bg); color:var(--pill-text); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:12px 0 6px; font-size:28px; line-height:1.1; }
    h2 { margin:0 0 12px; font-size:18px; }
    p { margin:8px 0 0; color:var(--muted); line-height:1.5; }
    .meta { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; }
    .stat small { display:block; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-size:11px; margin-bottom:6px; }
    .stat strong { font-size:24px; }
    .toolbarTitle { font-size:15px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pill { display:inline-flex; align-items:center; padding:9px 13px; border-radius:999px; background:var(--pill-bg); color:var(--pill-text); font-size:13px; font-weight:700; white-space:nowrap; }
    .themeBtn { width:44px; height:44px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--text); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow); flex:none; }
    .themeBtn:hover { background:var(--hover); }
    .themeBtn svg { width:18px; height:18px; }
    .mapWrap { padding:16px; height:100%; overflow:hidden; }
    .mapFrame { height:100%; min-height:0; border:1px solid var(--line); border-radius:24px; overflow:hidden; box-shadow:var(--shadow); background:var(--card); }
    #map { width:100%; height:100%; }
    .routeList { display:grid; gap:10px; overflow:auto; min-height:0; padding-right:4px; }
    .routeItem { width:100%; text-align:left; border:1px solid var(--line); border-radius:16px; background:var(--card); padding:14px; color:var(--text); cursor:pointer; }
    .routeItem:hover { background:var(--hover); }
    .routeItemHeader { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .routeLeft { display:flex; align-items:center; gap:10px; }
    .swatch { width:12px; height:12px; border-radius:999px; flex:none; }
    .routeName { font-weight:800; font-size:14px; }
    .routeCount { font-size:12px; color:var(--muted); }
    .stopList { margin-top:10px; display:grid; gap:6px; }
    .stopChip { font-size:12px; color:var(--muted); padding:8px 10px; border:1px solid var(--line); border-radius:12px; background:var(--card); }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip, .leaflet-control-layers, .leaflet-bar a { background:var(--card); color:var(--text); border-color:var(--line); }
    @media (max-width: 980px) {
      .app { grid-template-columns:1fr; height:calc(100vh - 69px); }
      .side { border-right:0; border-bottom:1px solid var(--line); min-height:0; max-height:45vh; }
      .main { min-height:0; }
      .mapWrap { min-height:0; }
      .mapFrame { min-height:0; }
      .toolbarTitle { font-size:14px; }
      .globalToolbar { padding:12px 14px; }
    }
  </style>
</head>

    function popupHtml(stop, route) {
      var codeText = stop.code ? 'Stop code: ' + esc(stop.code) : 'Supplemental stop';
      return '<div style="min-width:220px"><div style="font-weight:800;font-size:14px;margin-bottom:4px;">' + esc(stop.name) + '</div><div style="font-size:13px;color:#64748b;">Run ' + esc(route) + '</div><div style="font-size:13px;color:#64748b;margin-top:4px;">' + codeText + '</div><div style="font-size:13px;margin-top:8px;color:#334155;">' + Number(stop.lat).toFixed(6) + ', ' + Number(stop.lng).toFixed(6) + '</div></div>';

      if (theme === 'dark') {

        themeIconEl.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
      }
    }
    function applyTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      setThemeIcon(theme);
      if (theme === 'dark') {
        if (map.hasLayer(voyager)) map.removeLayer(voyager);
        if (map.hasLayer(positron)) map.removeLayer(positron);
        if (!map.hasLayer(darkMap)) darkMap.addTo(map);
      } else {
        if (map.hasLayer(darkMap)) map.removeLayer(darkMap);
        if (!map.hasLayer(voyager) && !map.hasLayer(positron)) voyager.addTo(map);
      }
      try { localStorage.setItem('bus-routes-theme', theme); } catch(e) {}
    }
    function fitToStops(stops) {
      if (!stops || !stops.length) return;
      var bounds = L.latLngBounds(stops.map(function(s){ return [s.lat, s.lng]; }));
      if (bounds.isValid()) map.fitBounds(bounds.pad(0.28));

    function drawMapAndLegend() {
      var allPoints = [];
      routeListEl.innerHTML = '';
      ROUTE_ORDER.forEach(function(route){ routeGroups[route].clearLayers(); });

      ROUTE_ORDER.forEach(function(route){
        var stops = ROUTE_STOPS[route] || [];

          allPoints.push([stop.lat, stop.lng]);
        });

        item.type = 'button';

        count.className = 'routeCount';

        left.appendChild(swatch); left.appendChild(title);
        header.appendChild(left); header.appendChild(count);
        item.appendChild(header);
        var stopList = document.createElement('div');
        stopList.className = 'stopList';
        stops.forEach(function(stop){
          var chip = document.createElement('div');
          chip.className = 'stopChip';
          chip.textContent = stop.name;
          stopList.appendChild(chip);
        });
        item.appendChild(stopList);

      });

      if (allPoints.length) {
        var bounds = L.latLngBounds(allPoints);
        if (bounds.isValid()) map.fitBounds(bounds.pad(0.16));
      }
    }
