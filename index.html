<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mark Twain District 21 Bus Routes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    :root {--bg:#f4f7fb;--panel:rgba(255,255,255,0.92);--panel-solid:#ffffff;--text:#162033;--muted:#5f6b7a;--line:#dbe2ea;--shadow:0 18px 40px rgba(15,23,42,.12);}
    body.dark {--bg:#0b1220;--panel:rgba(15,23,42,0.90);--panel-solid:#111827;--text:#e5eefb;--muted:#9fb0c7;--line:#243247;--shadow:0 22px 50px rgba(0,0,0,.38);}
    * {box-sizing:border-box;}
    html,body {margin:0;height:100%;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:var(--bg);}
    .globalToolbar {position:sticky;top:0;z-index:1200;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .globalToolbarLeft {display:flex;align-items:center;gap:10px;min-width:0;}
    .toolbarTitle {font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .themeBtn {width:44px;height:44px;border-radius:999px;border:1px solid var(--line);background:var(--panel-solid);color:var(--text);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);flex:none;}
    .themeBtn svg {width:18px;height:18px;}
    .pill {display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:#eaf2ff;color:#2563eb;font-size:13px;font-weight:700;white-space:nowrap;}
    .app {display:grid;grid-template-columns:390px 1fr;height:calc(100vh - 73px);}
    .side {padding:20px;border-right:1px solid var(--line);background:var(--panel);backdrop-filter:blur(10px);overflow:hidden;display:flex;flex-direction:column;min-height:0;}
    .main {display:grid;grid-template-rows:auto 1fr;min-height:0;overflow:hidden;}
    .card {background:var(--panel-solid);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
    .legendCard {flex:1;min-height:0;display:flex;flex-direction:column;margin-bottom:0;}
    .eyebrow {display:inline-block;padding:6px 10px;border-radius:999px;background:#e8f0ff;color:#2563eb;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    h1 {margin:12px 0 6px;font-size:28px;line-height:1.1;}
    h2 {margin:0 0 12px;font-size:18px;}
    p {margin:8px 0 0;color:var(--muted);line-height:1.5;}
    .meta {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
    .stat {background:var(--panel-solid);border:1px solid var(--line);border-radius:16px;padding:14px;}
    .stat small {display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:11px;margin-bottom:6px;}
    .stat strong {font-size:24px;}
    .toolbar {padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel);backdrop-filter:blur(10px);display:flex;align-items:center;gap:12px;}
    .toolbar input {flex:1;min-width:180px;height:42px;border:1px solid var(--line);border-radius:14px;padding:0 14px;font-size:14px;background:var(--panel-solid);color:var(--text);}
    .mapWrap {padding:16px;height:100%;overflow:hidden;}
    .mapFrame {height:100%;min-height:0;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);}
    #map {width:100%;height:100%;}
    .routeList {display:grid;gap:8px;overflow:auto;min-height:0;padding-right:4px;}
    .routeItem {display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:14px;background:var(--panel-solid);padding:12px 13px;cursor:pointer;width:100%;text-align:left;}
    .routeItem:hover {background:var(--panel);}
    .routeLeft {display:flex;align-items:center;gap:10px;min-width:0;}
    .swatch {width:12px;height:12px;border-radius:999px;flex:none;}
    .routeName {font-weight:700;font-size:14px;color:var(--text);}
    .routeCount {font-size:12px;color:var(--muted);}
    .leaflet-popup-content-wrapper {border-radius:16px;}
    @media (max-width:980px) {
      .app {grid-template-columns:1fr;grid-template-rows:auto 1fr;height:calc(100vh - 64px);}
      .side {border-right:0;border-bottom:1px solid var(--line);min-height:0;max-height:28vh;overflow:hidden;}
      .side .card:first-child {display:none;}
      .legendCard {border-radius:12px;margin-bottom:0;}
      .main {min-height:0;}
      .mapWrap {padding:10px;min-height:0;height:100%;}
      .mapFrame {min-height:0;height:100%;border-radius:16px;}
      .globalToolbar {padding:10px 14px;}
      .toolbarTitle {font-size:14px;}
    }
  </style>
</head>
<body>
  <div class="globalToolbar">
    <div class="globalToolbarLeft">
      <div class="toolbarTitle">Mark Twain District 21 Bus Routes</div>
      <span class="pill" id="matchCount">Loading stops...</span>
    </div>
    <button id="themeToggle" class="themeBtn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
  </div>
  <div class="app">
    <aside class="side">
      <div class="card">
        <span class="eyebrow">Brooklyn</span>
        <h1>Bus Routes</h1>
        <p>Tap a route to zoom to its stops. Use the layer control to show/hide individual runs.</p>
        <div class="meta">
          <div class="stat"><small>Routes</small><strong id="totalRoutes">-</strong></div>
          <div class="stat"><small>Stops</small><strong id="totalStops">-</strong></div>
        </div>
      </div>
      <div class="card legendCard">
        <h2>Route legend</h2>
        <div class="routeList" id="routeList"></div>
      </div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search route, stop name, or code" />
      </div>
      <div class="mapWrap"><div class="mapFrame"><div id="map"></div></div></div>
    </main>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const ROUTE_COLORS = {"9020":"#2563eb","9111":"#dc2626","9115":"#16a34a","9122":"#9333ea","9132":"#ea580c","9158":"#0891b2","9163":"#d97706","9173":"#4f46e5","9197":"#be123c","9249":"#0f766e","9284":"#7c3aed","9369":"#65a30d"};
    const ROUTE_ORDER = ["9020","9111","9115","9122","9132","9158","9163","9173","9197","9249","9284","9369"];

    async function init() {
      const response = await fetch('routes.csv');
      const csvText = await response.text();
      const lines = csvText.split('\n').filter(l => l.trim() !== '');
      
      const stopMap = {};
      lines.slice(1).forEach(line => {
        const parts = line.split(',');
        if (parts.length < 4) return;
        const route = parts[0].trim();
        const name = parts[1].trim();
        const lat = parseFloat(parts[2]);
        const lng = parseFloat(parts[3]);
        const key = `${name}-${lat}-${lng}`;
        if (!stopMap[key]) {
          stopMap[key] = { name, lat, lng, routes: [], code: '' };
        }
        if (!stopMap[key].routes.includes(route)) {
          stopMap[key].routes.push(route);
        }
      });
      
      const STOPS = Object.values(stopMap);

      document.getElementById('totalRoutes').textContent = ROUTE_ORDER.length;
      document.getElementById('totalStops').textContent = STOPS.length;
      document.getElementById('matchCount').textContent = STOPS.length + ' stops';

      const map = L.map('map', {zoomControl:true,minZoom:10}).setView([40.594,-73.974],12);
      const voyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap contributors &copy; CARTO'}).addTo(map);
      const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20,attribution:'&copy; OpenStreetMap contributors &copy; CARTO'});

      const routeGroups = {};
      const overlayMaps = {};
      
      ROUTE_ORDER.forEach(r => { 
        routeGroups[r] = L.layerGroup().addTo(map); 
        overlayMaps['Run '+r] = routeGroups[r]; 
        
        const routeStops = lines.slice(1).map(l => l.split(',')).filter(parts => parts[0].trim() === r);
        
        if (routeStops.length > 1) {
          const latLngs = routeStops.map(s => [parseFloat(s[2]), parseFloat(s[3])]);
          L.polyline(latLngs, {
            color: ROUTE_COLORS[r],
            weight: 3,
            opacity: 0.6,
            dashArray: '5, 10'
          }).addTo(routeGroups[r]);
        }
      });
      
      L.control.layers({'Voyager':voyager,'Dark':darkTiles}, overlayMaps, {position:'topleft',collapsed:true}).addTo(map);

      function esc(s) { return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
      function popupHtml(stop) {
        return '<div style="min-width:220px"><div style="font-weight:800;font-size:14px;margin-bottom:4px;">'+esc(stop.name)+'</div><div style="font-size:13px;color:#64748b;">'+stop.routes.map(r=>'Run '+r).join(', ')+'</div><div style="font-size:13px;margin-top:8px;color:#334155;">'+Number(stop.lat).toFixed(6)+', '+Number(stop.lng).toFixed(6)+'</div></div>';
      }

      const allMarkers = [];
      STOPS.forEach(stop => {
        const color = ROUTE_COLORS[stop.routes[0]] || '#94a3b8';
        const marker = L.circleMarker([stop.lat,stop.lng],{radius:8,color,fillColor:color,fillOpacity:0.9,weight:2}).bindPopup(popupHtml(stop));
        if (routeGroups[stop.routes[0]]) routeGroups[stop.routes[0]].addLayer(marker);
        allMarkers.push({stop,marker});
      });

      const routeListEl = document.getElementById('routeList');
      const searchEl = document.getElementById('search');
      const matchCountEl = document.getElementById('matchCount');
      const themeToggleEl = document.getElementById('themeToggle');
      const themeIconEl = document.getElementById('themeIcon');

      function setThemeIcon(theme) {
        if (theme==='dark') { themeIconEl.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'; }
        else { themeIconEl.innerHTML='<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'; }
      }
      function applyTheme(theme) {
        document.body.classList.toggle('dark',theme==='dark');
        setThemeIcon(theme);
        if (theme==='dark') { if (!map.hasLayer(darkTiles)) darkTiles.addTo(map); if (map.hasLayer(voyager)) map.removeLayer(voyager); }
        else { if (!map.hasLayer(voyager)) voyager.addTo(map); if (map.hasLayer(darkTiles)) map.removeLayer(darkTiles); }
        try { localStorage.setItem('bus-routes-theme',theme); } catch(e) {}
      }
      themeToggleEl.addEventListener('click',()=>applyTheme(document.body.classList.contains('dark')?'light':'dark'));
      applyTheme((()=>{ try { return localStorage.getItem('bus-routes-theme')||'light'; } catch(e) { return 'light'; } })());

      ROUTE_ORDER.forEach(route => {
        const stops = STOPS.filter(s=>s.routes.includes(route));
        const container = document.createElement('div');
        const header = document.createElement('button');
        header.type='button'; header.className='routeItem';
        header.innerHTML='<div class="routeLeft"><span class="swatch" style="background:'+(ROUTE_COLORS[route]||'#94a3b8')+'"></span><span class="routeName">Run '+route+'</span></div><span class="routeCount">'+stops.length+' stop'+(stops.length===1?'':'s')+'</span>';
        
        const stopList = document.createElement('div');
        stopList.style.display = 'none';
        stopList.style.padding = '0 13px 12px 13px';
        stopList.style.fontSize = '13px';
        stopList.style.border = '1px solid var(--line)';
        stopList.style.borderTop = 'none';
        stopList.style.borderBottomLeftRadius = '14px';
        stopList.style.borderBottomRightRadius = '14px';
        stopList.style.marginTop = '-10px';
        stopList.style.background = 'var(--panel-solid)';
        
        stops.forEach(stop => {
          const item = document.createElement('div');
          item.innerHTML = '<span style="margin-right:8px;">&bull;</span>' + stop.name;
          item.style.padding = '4px 0';
          item.style.cursor = 'pointer';
          item.style.color = 'var(--muted)';
          item.onmouseover = () => item.style.color = 'var(--text)';
          item.onmouseout = () => item.style.color = 'var(--muted)';
          item.onclick = (e) => { 
            e.stopPropagation();
            map.setView([stop.lat, stop.lng], 16); 
          };
          stopList.appendChild(item);
        });

        header.style.borderRadius = '14px';
        let currentlyActiveRoute = null;

        header.addEventListener('click',()=>{
          const isOpening = stopList.style.display === 'none';
          stopList.style.display = isOpening ? 'block' : 'none';
          header.style.borderBottomLeftRadius = isOpening ? '0' : '14px';
          header.style.borderBottomRightRadius = isOpening ? '0' : '14px';

          // Focus logic
          currentlyActiveRoute = isOpening ? route : null;
          ROUTE_ORDER.forEach(r => {
            const opacity = (currentlyActiveRoute === null || r === currentlyActiveRoute) ? 1 : 0.1;
            routeGroups[r].getLayers().forEach(l => {
              if (l instanceof L.CircleMarker) l.setStyle({opacity, fillOpacity: opacity});
              else if (l instanceof L.Polyline) l.setStyle({opacity});
            });
          });

          if (isOpening && !map.hasLayer(routeGroups[route])) routeGroups[route].addTo(map);
          if (isOpening && stops.length) { 
            const b=L.latLngBounds(stops.map(s=>[s.lat,s.lng])); 
            if (b.isValid()) map.flyToBounds(b.pad(0.28), { duration: 1.5 }); 
          }
        });
        });
        
        container.appendChild(header);
        container.appendChild(stopList);
        routeListEl.appendChild(container);
      });

      searchEl.addEventListener('input',()=>{
        const q=searchEl.value.trim().toLowerCase();
        let count=0;
        allMarkers.forEach(({stop,marker})=>{
          const match=!q||stop.name.toLowerCase().includes(q)||stop.routes.some(r=>r.includes(q));
          if (match) { count++; marker.setStyle({opacity:1,fillOpacity:0.9}); }
          else { marker.setStyle({opacity:0.1,fillOpacity:0.1}); }
        });
        matchCountEl.textContent=count+' stop'+(count===1?'':'s');
      });

      const allBounds=L.latLngBounds(STOPS.map(s=>[s.lat,s.lng]));
      if (allBounds.isValid()) map.fitBounds(allBounds.pad(0.12));
    }

    init();
  </script>
</body>
</html>
